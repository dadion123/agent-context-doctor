name: Agent Context Doctor
description: Scan AI coding agent context files for drift, bloat, and safety issues.
author: DADION

branding:
  icon: activity
  color: blue

inputs:
  path:
    description: Repository path to scan.
    required: false
    default: "."
  min-score:
    description: Minimum accepted context health score.
    required: false
    default: "70"
  locale:
    description: Text report language, en or ja.
    required: false
    default: "en"
  sarif:
    description: Write a SARIF report file for GitHub code scanning upload.
    required: false
    default: "false"
  sarif-output:
    description: SARIF report output path when sarif is true.
    required: false
    default: "agent-context-doctor.sarif"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.7.0

    - name: Install Agent Context Doctor dependencies
      shell: bash
      run: pnpm --dir "$GITHUB_ACTION_PATH" install --frozen-lockfile

    - name: Build Agent Context Doctor
      shell: bash
      run: pnpm --dir "$GITHUB_ACTION_PATH" build

    - name: Run Agent Context Doctor
      shell: bash
      run: |
        if [ "${{ inputs.sarif }}" = "true" ]; then
          node "$GITHUB_ACTION_PATH/dist/cli.js" ci "${{ inputs.path }}" --min-score "${{ inputs.min-score }}" --locale "${{ inputs.locale }}" --sarif --output "${{ inputs.sarif-output }}"
        else
          node "$GITHUB_ACTION_PATH/dist/cli.js" ci "${{ inputs.path }}" --min-score "${{ inputs.min-score }}" --locale "${{ inputs.locale }}"
        fi
